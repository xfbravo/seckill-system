name: Build Windows Executable

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'client/**'
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          install-deps: true

      - name: Setup Qt
        shell: bash
        run: |
          echo "QTDIR=C:/Qt/6.5.0/mingw_64" >> $GITHUB_ENV
          echo "PATH=C:/Qt/6.5.0/mingw_64/bin;$PATH" >> $GITHUB_ENV

      - name: qmake
        shell: bash
        run: |
          cd client
          C:/Qt/6.5.0/mingw_64/bin/qmake -o Makefile seckill_client.pro

      - name: Build
        shell: bash
        run: |
          cd client
          mingw32-make -j$(nproc)

      - name: Deploy
        shell: bash
        run: |
          mkdir -p dist
          cp client/release/seckill_client.exe dist/

          # Deploy Qt DLLs
          C:/Qt/6.5.0/mingw_64/bin/windeployqt dist/seckill_client.exe --no-translations

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seckill-client-windows
          path: dist/

      - name: Create Release
        if: github.event_name == 'release'
        shell: bash
        run: |
          cd dist
          7z a seckill-client.zip *.exe *.dll
          echo "ASSET_PATH=${{ github.workspace }}/dist/seckill-client.zip" >> $GITHUB_ENV

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_PATH }}
