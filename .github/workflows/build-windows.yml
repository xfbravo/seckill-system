name: Build Windows Executable

on:
  push:
    branches: [master]
    paths:
      - "client/**"
  pull_request:
    branches: [master]
    paths:
      - "client/**"
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.0"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw"
          install-deps: true

      - name: Build with CMake
        shell: bash
        env:
          Qt6_DIR: ${{ env.Qt6_DIR }}
        run: |
          mkdir -p client/build
          cd client/build
          cmake -G "MinGW Makefiles" ..
          mingw32-make -j$(nproc)

      - name: Deploy
        shell: bash
        run: |
          mkdir -p dist
          cp client/build/seckill_client.exe dist/
          windeployqt dist/seckill_client.exe --no-translations

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seckill-client-windows
          path: dist/

      - name: Create Release
        if: github.event_name == 'release'
        shell: bash
        run: |
          cd dist
          7z a seckill-client.zip *.exe *.dll
          echo "ASSET_PATH=${{ github.workspace }}/dist/seckill-client.zip" >> $GITHUB_ENV

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_PATH }}
